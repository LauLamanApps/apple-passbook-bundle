name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }} / Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.1'
            symfony: '6.4.*'
          - php: '8.2'
            symfony: '6.4.*'
          - php: '8.2'
            symfony: '7.0.*'
          - php: '8.3'
            symfony: '7.2.*'
          - php: '8.4'
            symfony: '8.0.*'
          - php: '8.4'
            symfony: '8.1.*'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl, zip
          coverage: none

      - name: Set Symfony version
        run: |
          composer require --no-update symfony/http-foundation:${{ matrix.symfony }}
          composer require --no-update symfony/routing:${{ matrix.symfony }}
          composer require --no-update symfony/event-dispatcher:${{ matrix.symfony }}
          composer require --no-update symfony/framework-bundle:${{ matrix.symfony }}
          composer require --no-update --dev symfony/yaml:${{ matrix.symfony }}
          composer require --no-update --dev symfony/browser-kit:${{ matrix.symfony }}

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run unit tests
        run: bin/phpunit --testsuite=unit

      - name: Run functional tests
        run: bin/phpunit --testsuite=functional
